<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <title>แจ้งลางาน</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --navy: #0A1628;
      --navy-mid: #122040;
      --navy-soft: #1B3060;
      --gold: #C9A84C;
      --gold-lt: #E2C47A;
      --gold-dim: rgba(201, 168, 76, 0.18);
      --white: #FFFFFF;
      --muted: #8B9AB5;
      --border: rgba(255, 255, 255, 0.08);
      --card-bg: rgba(255, 255, 255, 0.04);
      --success: #22C55E;
      --danger: #EF4444;
      --sick: #F87171;
      --personal: #60A5FA;
      --vacation: #34D399;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201, 168, 76, 0.10) 0%, transparent 60%),
        radial-gradient(ellipse 60% 60% at -10% 60%, rgba(27, 48, 96, 0.8) 0%, transparent 60%),
        radial-gradient(ellipse 50% 70% at 110% 30%, rgba(18, 32, 64, 0.9) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    body>* {
      position: relative;
      z-index: 1;
    }

    /* ── Loading ── */
    #loading-screen {
      position: fixed;
      inset: 0;
      background: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 200;
      transition: opacity 0.5s ease;
    }

    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .load-logo {
      font-family: 'Prompt', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .load-ring {
      width: 44px;
      height: 44px;
      border: 2px solid var(--gold-dim);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .load-text {
      font-size: 13px;
      color: var(--muted);
    }

    /* ── Header ── */
    .header {
      width: 100%;
      background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy-soft) 100%);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 18px;
      padding-top: max(16px, env(safe-area-inset-top, 16px));
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20px;
      right: 20px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    }

    .header-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--gold-dim);
      border: 1.5px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: var(--gold);
      overflow: hidden;
      flex-shrink: 0;
    }

    .header-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .header-info {
      flex: 1;
      min-width: 0;
    }

    .header-name {
      font-family: 'Prompt', sans-serif;
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-top: 1px;
    }

    .back-link {
      font-size: 12px;
      font-family: 'Prompt', sans-serif;
      color: var(--gold);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid rgba(201, 168, 76, 0.3);
      background: var(--gold-dim);
      transition: all 0.2s;
      flex-shrink: 0;
      letter-spacing: 0.03em;
    }

    .back-link:active {
      background: rgba(201, 168, 76, 0.25);
    }

    /* ── Main ── */
    .main {
      width: 100%;
      max-width: 480px;
      padding: 20px 16px 32px;
    }

    /* ── Section Label ── */
    .section-label {
      font-family: 'Prompt', sans-serif;
      font-size: 10px;
      font-weight: 600;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--gold-dim), transparent);
    }

    /* ── Leave Type Grid ── */
    .leave-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .leave-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 8px 12px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-align: center;
      color: var(--white);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .leave-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      border-radius: 14px 14px 0 0;
      background: var(--accent-color, transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .leave-btn:active {
      transform: scale(0.96);
    }

    .leave-btn[data-type="sick"] {
      --accent-color: var(--sick);
    }

    .leave-btn[data-type="personal"] {
      --accent-color: var(--personal);
    }

    .leave-btn[data-type="vacation"] {
      --accent-color: var(--vacation);
    }

    .leave-btn.selected {
      border-color: var(--accent-color);
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3), 0 0 0 1px var(--accent-color) inset;
    }

    .leave-btn.selected::before {
      opacity: 1;
    }

    .leave-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-color);
      box-shadow: 0 0 8px var(--accent-color);
      margin: 0 auto 8px;
    }

    .leave-btn.selected .leave-dot {
      animation: pulse-dot 1.8s ease infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        box-shadow: 0 0 8px var(--accent-color);
      }

      50% {
        box-shadow: 0 0 16px var(--accent-color), 0 0 24px var(--accent-color);
      }
    }

    .leave-icon {
      font-size: 22px;
      margin-bottom: 6px;
    }

    .leave-name {
      font-family: 'Prompt', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--white);
    }

    .leave-btn.selected .leave-name {
      color: var(--accent-color);
    }

    /* ── Card ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    .form-label {
      font-family: 'Prompt', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      display: block;
    }

    .form-input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      font-family: 'Sarabun', sans-serif;
      color: var(--white);
      transition: border-color 0.2s;
      -webkit-appearance: none;
      color-scheme: dark;
    }

    .form-input:focus {
      outline: none;
      border-color: rgba(201, 168, 76, 0.5);
      background: rgba(255, 255, 255, 0.08);
    }

    .form-input::placeholder {
      color: var(--muted);
    }

    textarea.form-input {
      resize: none;
      height: 90px;
    }

    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .date-sub-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      display: block;
    }

    /* ── Camera (medical cert) ── */
    .cert-section {
      display: none;
    }

    .cert-section.show {
      display: block;
    }

    .cert-header {
      font-family: 'Prompt', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cert-header span {
      font-weight: 400;
      opacity: 0.6;
      text-transform: none;
      letter-spacing: 0;
    }

    .camera-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #070D1C;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }

    #cert-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #cert-canvas {
      display: none;
    }

    .cam-guide {
      position: absolute;
      inset: 10px;
      pointer-events: none;
    }

    .cam-guide::before,
    .cam-guide::after,
    .cam-guide span::before,
    .cam-guide span::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.5;
    }

    .cam-guide::before {
      top: 0;
      left: 0;
      border-width: 2px 0 0 2px;
      border-radius: 3px 0 0 0;
    }

    .cam-guide::after {
      top: 0;
      right: 0;
      border-width: 2px 2px 0 0;
      border-radius: 0 3px 0 0;
    }

    .cam-guide span::before {
      bottom: 0;
      left: 0;
      border-width: 0 0 2px 2px;
      border-radius: 0 0 0 3px;
    }

    .cam-guide span::after {
      bottom: 0;
      right: 0;
      border-width: 0 2px 2px 0;
      border-radius: 0 0 3px 0;
    }

    .camera-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      background: rgba(7, 13, 28, 0.85);
      backdrop-filter: blur(4px);
      transition: opacity 0.3s;
    }

    .camera-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .overlay-icon-wrap {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--gold-dim);
      border: 1px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .overlay-text {
      font-size: 12px;
      color: var(--muted);
    }

    #cert-preview-wrap {
      display: none;
      position: relative;
    }

    #cert-preview {
      width: 100%;
      border-radius: 14px;
      display: block;
      border: 1px solid var(--border);
    }

    .shutter-wrap {
      display: flex;
      justify-content: center;
      margin: 6px 0 2px;
    }

    .shutter-btn {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-lt) 0%, var(--gold) 100%);
      border: none;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 4px rgba(201, 168, 76, 0.15), 0 4px 20px rgba(201, 168, 76, 0.3);
      position: relative;
    }

    .shutter-btn::after {
      content: '';
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.4);
    }

    .shutter-btn svg {
      width: 22px;
      height: 22px;
      fill: var(--navy);
    }

    .shutter-btn:active {
      transform: scale(0.92);
    }

    .shutter-btn:disabled {
      background: var(--navy-soft);
      box-shadow: none;
      cursor: default;
    }

    .retake-btn {
      margin-top: 10px;
      width: 100%;
      padding: 11px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Sarabun', sans-serif;
      transition: all 0.2s;
    }

    .retake-btn:active {
      border-color: rgba(201, 168, 76, 0.4);
      color: var(--gold-lt);
      background: var(--gold-dim);
    }

    /* ── Submit ── */
    .submit-btn {
      width: 100%;
      padding: 17px;
      background: linear-gradient(135deg, #1B3060 0%, var(--navy-soft) 50%, #1B3060 100%);
      color: var(--gold-lt);
      font-size: 15px;
      font-weight: 600;
      font-family: 'Prompt', sans-serif;
      border: 1px solid rgba(201, 168, 76, 0.4);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 24px rgba(201, 168, 76, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.08), transparent);
      transition: left 0.4s;
    }

    .submit-btn:not(:disabled):hover::before {
      left: 100%;
    }

    .submit-btn:not(:disabled):active {
      transform: scale(0.99);
      border-color: var(--gold);
    }

    .submit-btn:disabled {
      opacity: 0.35;
      cursor: default;
    }

    /* ── Status ── */
    .status-box {
      display: none;
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      line-height: 1.6;
      white-space: pre-line;
    }

    .status-box.success {
      display: block;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86EFAC;
    }

    .status-box.error {
      display: block;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #FCA5A5;
    }

    .status-box.loading {
      display: block;
      background: rgba(96, 165, 250, 0.1);
      border: 1px solid rgba(96, 165, 250, 0.2);
      color: #BAE6FD;
    }

    /* ── Fade-in ── */
    .fade-in {
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.4s ease forwards;
    }

    .fade-in:nth-child(1) {
      animation-delay: 0.05s;
    }

    .fade-in:nth-child(2) {
      animation-delay: 0.1s;
    }

    .fade-in:nth-child(3) {
      animation-delay: 0.15s;
    }

    .fade-in:nth-child(4) {
      animation-delay: 0.2s;
    }

    .fade-in:nth-child(5) {
      animation-delay: 0.25s;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }
  </style>
</head>

<body>

  <!-- Loading -->
  <div id="loading-screen">
    <div class="load-logo">HR System</div>
    <div class="load-ring"></div>
    <div class="load-text">กำลังโหลด...</div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-avatar">
      <img id="profile-pic" src="" alt="" onerror="this.style.display='none'">
      <span id="profile-initial"></span>
    </div>
    <div class="header-info">
      <div class="header-name" id="profile-name">กำลังโหลด...</div>
      <div class="header-sub">แจ้งลางาน &nbsp;·&nbsp; Leave Request</div>
    </div>
    <a href="index.html" class="back-link">← ลงเวลา</a>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Leave Type -->
    <div class="section-label fade-in">ประเภทการลา</div>
    <div class="leave-grid fade-in">
      <button class="leave-btn selected" data-type="sick" onclick="selectType('sick')">
        <div class="leave-dot"></div>
        <div class="leave-icon">🤒</div>
        <div class="leave-name">ลาป่วย</div>
      </button>
      <button class="leave-btn" data-type="personal" onclick="selectType('personal')">
        <div class="leave-dot"></div>
        <div class="leave-icon">📝</div>
        <div class="leave-name">ลากิจ</div>
      </button>
      <button class="leave-btn" data-type="vacation" onclick="selectType('vacation')">
        <div class="leave-dot"></div>
        <div class="leave-icon">🏖️</div>
        <div class="leave-name">ลาพักร้อน</div>
      </button>
    </div>

    <!-- Form Card -->
    <div class="card fade-in">

      <!-- Date -->
      <div class="form-group">
        <label class="form-label">วันที่ลา</label>
        <div class="date-row">
          <div>
            <span class="date-sub-label">วันเริ่มต้น</span>
            <input type="date" class="form-input" id="date-start">
          </div>
          <div>
            <span class="date-sub-label">วันสิ้นสุด</span>
            <input type="date" class="form-input" id="date-end">
          </div>
        </div>
      </div>

      <!-- Note -->
      <div class="form-group">
        <label class="form-label" id="note-label">หมายเหตุ / อาการเบื้องต้น</label>
        <textarea class="form-input" id="note" placeholder="กรอกรายละเอียด..."></textarea>
      </div>

      <!-- Medical Cert (sick only) -->
      <div class="cert-section show" id="cert-section">
        <div class="cert-header">ใบรับรองแพทย์ <span>(ถ้ามี)</span></div>
        <div class="camera-wrap" id="cert-camera-wrap">
          <video id="cert-video" autoplay playsinline muted webkit-playsinline></video>
          <canvas id="cert-canvas"></canvas>
          <div class="cam-guide"><span></span></div>
          <div class="camera-overlay" id="cert-overlay">
            <div class="overlay-icon-wrap">📄</div>
            <div class="overlay-text">กำลังเปิดกล้อง...</div>
          </div>
        </div>
        <div id="cert-preview-wrap">
          <img id="cert-preview" alt="ใบรับรองแพทย์">
          <button class="retake-btn" onclick="retakeCert()">↩ ถ่ายใหม่</button>
        </div>
        <div class="shutter-wrap">
          <button class="shutter-btn" id="cert-shutter" onclick="captureCert()">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.5-10h-2.08L16 4H8L6.08 5.5H4a2 2 0 0 0-2 2V19a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V7.5a2 2 0 0 0-2-2Z" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Submit -->
    <button class="submit-btn fade-in" id="submit-btn" onclick="submitLeave()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
      </svg>
      ส่งคำขอลา
    </button>

    <div class="status-box" id="status-box"></div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxxkyVB9zcoOFmPavD1LCAxpSHYwsfwaLgnfb1ilMUldPvCIdlbGeWOJtS8J8LL5_Ez/exec";
    const LIFF_ID = "2010074074-oOwr1JIe";


    const leaveLabels = { sick: "ลาป่วย", personal: "ลากิจ", vacation: "ลาพักร้อน" };
    const noteHints = { sick: "หมายเหตุ / อาการเบื้องต้น", personal: "หมายเหตุ / เหตุผลการลา", vacation: "หมายเหตุ" };

    window.onload = () => {
      const today = new Date().toISOString().split("T")[0];
      document.getElementById("date-start").value = today;
      document.getElementById("date-end").value = today;
    };

    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        lineUserId = profile.userId;
        employeeName = profile.displayName;
        document.getElementById("profile-name").textContent = profile.displayName;
        if (profile.pictureUrl) {
          document.getElementById("profile-pic").src = profile.pictureUrl;
        } else {
          document.getElementById("profile-initial").textContent = profile.displayName.charAt(0);
        }
      } catch (err) {
        lineUserId = "U_TEST_ID";
        employeeName = "ทดสอบ";
        document.getElementById("profile-name").textContent = "ทดสอบ (นอก LINE)";
        document.getElementById("profile-initial").textContent = "ท";
      }
      await startCertCamera();
      const ls = document.getElementById("loading-screen");
      ls.classList.add("fade-out");
      setTimeout(() => ls.style.display = "none", 500);
    }

    async function startCertCamera() {
      try {
        certStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" }, width: { ideal: 800 }, height: { ideal: 600 } },
          audio: false
        });
        const video = document.getElementById("cert-video");
        video.srcObject = certStream;
        video.onloadedmetadata = () => video.play().catch(e => console.warn(e));
        document.getElementById("cert-overlay").classList.add("hidden");
      } catch (err) {
        const ov = document.getElementById("cert-overlay");
        ov.querySelector(".overlay-icon-wrap").textContent = "⚠️";
        ov.querySelector(".overlay-text").textContent = "ไม่สามารถเปิดกล้องได้";
        console.warn("Camera:", err);
      }
    }

    function selectType(type) {
      leaveType = type;
      document.querySelectorAll(".leave-btn").forEach(b => b.classList.remove("selected"));
      document.querySelector(`.leave-btn[data-type="${type}"]`).classList.add("selected");
      document.getElementById("note-label").textContent = noteHints[type];

      const certSection = document.getElementById("cert-section");
      if (type === "sick") {
        certSection.classList.add("show");
        startCertCamera();
      } else {
        certSection.classList.remove("show");
        certImage = null;
        if (certStream) certStream.getTracks().forEach(t => t.stop());
      }
    }

    function captureCert() {
      const video = document.getElementById("cert-video");
      const canvas = document.getElementById("cert-canvas");
      canvas.width = video.videoWidth || 800;
      canvas.height = video.videoHeight || 600;
      canvas.getContext("2d").drawImage(video, 0, 0);
      certImage = canvas.toDataURL("image/jpeg", 0.75).split(",")[1];
      document.getElementById("cert-preview").src = canvas.toDataURL("image/jpeg", 0.75);
      document.getElementById("cert-preview-wrap").style.display = "block";
      document.getElementById("cert-camera-wrap").style.display = "none";
      document.getElementById("cert-shutter").disabled = true;
      if (certStream) certStream.getTracks().forEach(t => t.stop());
    }

    function retakeCert() {
      certImage = null;
      document.getElementById("cert-preview-wrap").style.display = "none";
      document.getElementById("cert-camera-wrap").style.display = "block";
      document.getElementById("cert-shutter").disabled = false;
      startCertCamera();
    }

    async function submitLeave() {
      const dateStart = document.getElementById("date-start").value;
      const dateEnd = document.getElementById("date-end").value;
      const note = document.getElementById("note").value;

      if (!dateStart || !dateEnd) { setStatus("❌ กรุณาเลือกวันที่ลา", "error"); return; }
      if (!note.trim()) { setStatus("❌ กรุณากรอกหมายเหตุ", "error"); return; }

      setStatus("⏳ กำลังส่งคำขอลา...", "loading");
      document.getElementById("submit-btn").disabled = true;

      const payload = JSON.stringify({
        type: "leave", lineUserId, employeeName,
        leaveType, leaveLabel: leaveLabels[leaveType],
        dateStart, dateEnd, note,
        certImage: certImage || null,
        timestamp: new Date().toISOString()
      });

      try {
        await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: payload });
        setStatus(
          `✅ ส่งคำขอ${leaveLabels[leaveType]}สำเร็จ\nวันที่: ${dateStart} ถึง ${dateEnd}\nรอผู้บริหารอนุมัติ`,
          "success"
        );
      } catch (err) {
        setStatus("❌ เกิดข้อผิดพลาด: " + err.message, "error");
        document.getElementById("submit-btn").disabled = false;
      }
    }

    function setStatus(msg, type) {
      const box = document.getElementById("status-box");
      box.className = "status-box" + (type ? " " + type : "");
      box.textContent = msg;
    }

    initLiff();
  </script>
</body>

</html>
