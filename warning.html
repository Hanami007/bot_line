<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ออกใบเตือน</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
  :root {
    --primary: #06C755; --primary-dark: #04A344;
    --bg: #F0F2F5; --card: #FFFFFF;
    --text: #1A1A2E; --text-sub: #6B7280; --border: #E5E7EB;
    --warn1: #F5A623; --warn2: #E24B4A; --warn3: #1A1A2E;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { width: 100%; background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
  .header-icon { width: 38px; height: 38px; border-radius: 50%; background: #FFF3E0; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .header-name { font-size: 15px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--text-sub); }

  .main { max-width: 480px; margin: 0 auto; padding: 16px; }

  /* ระดับความรุนแรง */
  .section-label { font-size: 12px; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .level-btn { border: 2px solid var(--border); background: var(--card); border-radius: 12px; padding: 12px 6px; cursor: pointer; text-align: center; transition: all .15s; }
  .level-btn:active { transform: scale(0.97); }
  .level-btn .lv-icon { font-size: 22px; margin-bottom: 4px; }
  .level-btn .lv-name { font-size: 12px; font-weight: 600; }
  .level-btn[data-level="1"] { color: var(--warn1); }
  .level-btn[data-level="2"] { color: var(--warn2); }
  .level-btn[data-level="3"] { color: var(--warn3); }
  .level-btn.selected { border-color: currentColor; background: color-mix(in srgb, currentColor 8%, white); }

  .card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 16px; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-group:last-child { margin-bottom: 0; }
  .form-label { font-size: 13px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; display: block; }
  .form-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-family: 'Sarabun', sans-serif; color: var(--text); background: var(--bg); appearance: none; }
  .form-input:focus { outline: none; border-color: var(--primary); }
  textarea.form-input { resize: none; height: 90px; }

  /* Preview ใบเตือน */
  .preview-card { display: none; border-radius: 16px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 16px; }
  .preview-card.show { display: block; }
  .preview-header { padding: 14px 16px; color: white; font-weight: 700; font-size: 15px; }
  .preview-body { background: white; padding: 16px; }
  .preview-row { display: flex; gap: 8px; margin-bottom: 8px; font-size: 13px; }
  .preview-row-label { color: var(--text-sub); min-width: 52px; }
  .preview-ref { font-size: 11px; color: #B4B2A9; margin-top: 12px; }

  .submit-btn { width: 100%; padding: 16px; background: var(--primary); color: white; font-size: 16px; font-weight: 600; font-family: 'Sarabun', sans-serif; border: none; border-radius: 14px; cursor: pointer; transition: all .15s; }
  .submit-btn:active { background: var(--primary-dark); transform: scale(0.98); }
  .submit-btn:disabled { background: var(--border); color: var(--text-sub); cursor: default; }

  .status-box { display: none; margin-top: 12px; padding: 14px 16px; border-radius: 12px; font-size: 14px; font-weight: 500; text-align: center; white-space: pre-line; }
  .status-box.success { background: #E8F5E9; color: #1B5E20; display: block; }
  .status-box.error   { background: #FFEBEE; color: #B71C1C; display: block; }
  .status-box.loading { background: #E3F2FD; color: #0D47A1; display: block; }

  #loading-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; z-index: 100; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading-screen">
  <div style="font-size:32px">⚠️</div>
  <div class="spinner"></div>
  <p style="font-size:14px;color:#6B7280">กำลังโหลด...</p>
</div>

<div class="header">
  <div class="header-icon">⚠️</div>
  <div>
    <div class="header-name">ออกใบเตือนพนักงาน</div>
    <div class="header-sub" id="header-sub">กำลังโหลด...</div>
  </div>
</div>

<div class="main">

  <!-- ระดับความรุนแรง -->
  <div class="section-label">ระดับความรุนแรง</div>
  <div class="level-grid">
    <button class="level-btn selected" data-level="1" onclick="selectLevel(1)">
      <div class="lv-icon">⚠️</div>
      <div class="lv-name">เตือน</div>
    </button>
    <button class="level-btn" data-level="2" onclick="selectLevel(2)">
      <div class="lv-icon">💸</div>
      <div class="lv-name">ตัดเงิน</div>
    </button>
    <button class="level-btn" data-level="3" onclick="selectLevel(3)">
      <div class="lv-icon">🚨</div>
      <div class="lv-name">ไล่ออก</div>
    </button>
  </div>

  <!-- ฟอร์ม -->
  <div class="card">
    <div class="form-group">
      <label class="form-label">พนักงาน</label>
      <select class="form-input" id="emp-select" onchange="updatePreview()">
        <option value="">— เลือกพนักงาน —</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">เรื่องที่เตือน</label>
      <textarea class="form-input" id="reason" placeholder="ระบุเหตุผลหรือพฤติกรรมที่ต้องการเตือน..." oninput="updatePreview()"></textarea>
    </div>
  </div>

  <!-- Preview -->
  <div class="preview-card" id="preview-card">
    <div class="preview-header" id="preview-header"></div>
    <div class="preview-body">
      <div class="preview-row">
        <span class="preview-row-label">พนักงาน</span>
        <span id="preview-name">—</span>
      </div>
      <div class="preview-row">
        <span class="preview-row-label">วันที่</span>
        <span id="preview-date">—</span>
      </div>
      <div class="preview-row" style="align-items:flex-start">
        <span class="preview-row-label">เรื่อง</span>
        <span id="preview-reason" style="flex:1">—</span>
      </div>
      <div class="preview-ref" id="preview-ref"></div>
    </div>
  </div>

  <button class="submit-btn" id="submit-btn" onclick="submitWarning()" disabled>
    📨 ส่งใบเตือน
  </button>
  <div class="status-box" id="status-box"></div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxfMhlTF-61y27ydikjGpKQX2RZj-wfqLzAron8zBIsGxS_B4d1HTNRy_mrS5DBotfW/exec";
const LIFF_ID = "2010074074-oOwr1JIe";

let selectedLevel = 1;
let ownerName = "";
let ownerId = "";

const levelConfig = {
  1: { label: "⚠️ หนังสือเตือน",    color: "#F5A623", labelText: "เตือนด้วยวาจา" },
  2: { label: "💸 หนังสือตัดเงิน",   color: "#E24B4A", labelText: "ตัดเงิน" },
  3: { label: "🚨 หนังสือเลิกจ้าง",  color: "#1A1A2E", labelText: "ไล่ออก" }
};

function selectLevel(level) {
  selectedLevel = level;
  document.querySelectorAll(".level-btn").forEach(b => b.classList.remove("selected"));
  document.querySelector(`.level-btn[data-level="${level}"]`).classList.add("selected");
  updatePreview();
}

function updatePreview() {
  const empSelect = document.getElementById("emp-select");
  const empName   = empSelect.options[empSelect.selectedIndex]?.text || "";
  const reason    = document.getElementById("reason").value.trim();
  const cfg       = levelConfig[selectedLevel];

  const hasData = empSelect.value && reason;
  document.getElementById("submit-btn").disabled = !hasData;

  const preview = document.getElementById("preview-card");
  if (!hasData) { preview.classList.remove("show"); return; }

  preview.classList.add("show");
  document.getElementById("preview-header").textContent = cfg.label;
  document.getElementById("preview-header").style.background = cfg.color;
  document.getElementById("preview-name").textContent   = empName;
  document.getElementById("preview-date").textContent   = new Date().toLocaleDateString("th-TH", { year: "numeric", month: "long", day: "numeric" });
  document.getElementById("preview-reason").textContent = reason;
  document.getElementById("preview-ref").textContent    = "ตัวอย่างก่อนส่ง";
}

async function loadEmployees() {
  try {
    const res  = await fetch(`${GAS_URL}?action=getEmployees`, { redirect: "follow" });
    const data = await res.json();
    const select = document.getElementById("emp-select");
    if (data.employees && data.employees.length > 0) {
      data.employees.forEach(emp => {
        const opt = document.createElement("option");
        opt.value = emp.userId;
        opt.text  = emp.name;
        select.appendChild(opt);
      });
      document.getElementById("header-sub").textContent = `พนักงาน ${data.employees.length} คน`;
    } else {
      document.getElementById("header-sub").textContent = "ไม่พบข้อมูลพนักงาน";
    }
  } catch (err) {
    document.getElementById("header-sub").textContent = "โหลดข้อมูลไม่ได้";
  }
}

async function submitWarning() {
  const empSelect = document.getElementById("emp-select");
  const empUserId = empSelect.value;
  const empName   = empSelect.options[empSelect.selectedIndex].text;
  const reason    = document.getElementById("reason").value.trim();

  if (!empUserId || !reason) return;

  setStatus("⏳ กำลังส่งใบเตือน...", "loading");
  document.getElementById("submit-btn").disabled = true;

  try {
    const res = await fetch(GAS_URL, {
      method:   "POST",
      headers:  { "Content-Type": "text/plain" },
      body:     JSON.stringify({
        type:       "warning",
        ownerId:    ownerId,
        empUserId:  empUserId,
        empName:    empName,
        reason:     reason,
        level:      selectedLevel,
        levelLabel: levelConfig[selectedLevel].labelText,
        timestamp:  new Date().toISOString()
      }),
      redirect: "follow"
    });
    const result = await res.json();
    if (result.success) {
      setStatus(`✅ ส่งใบเตือนให้ ${empName} แล้ว\nระดับ: ${levelConfig[selectedLevel].label}\nref: ${result.warningId}`, "success");
      document.getElementById("preview-card").classList.remove("show");
      document.getElementById("emp-select").value = "";
      document.getElementById("reason").value = "";
    } else {
      throw new Error(result.error || "ไม่ทราบสาเหตุ");
    }
  } catch (err) {
    setStatus("❌ เกิดข้อผิดพลาด: " + err.message, "error");
    document.getElementById("submit-btn").disabled = false;
  }
}

function setStatus(msg, type) {
  const box = document.getElementById("status-box");
  box.className = "status-box " + type;
  box.textContent = msg;
}

async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    ownerId   = profile.userId;
    ownerName = profile.displayName;
  } catch (err) {
    ownerId   = "U_TEST_OWNER";
    ownerName = "ทดสอบ";
  }
  await loadEmployees();
  document.getElementById("loading-screen").style.display = "none";
}

initLiff();
</script>
</body>
</html>
